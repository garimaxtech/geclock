<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fda4af"/>
      <stop offset="100%" stop-color="#e879f9"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- Left bell -->
  <circle cx="164" cy="182" r="54" fill="white" opacity="0.92"/>
  <!-- Right bell -->
  <circle cx="348" cy="182" r="54" fill="white" opacity="0.92"/>

  <!-- Clock body -->
  <circle cx="256" cy="295" r="178" fill="white"/>
  <circle cx="256" cy="295" r="152" fill="#fff0f5"/>

  <!-- Hour markers -->
  <rect x="248" y="165" width="16" height="28" rx="8" fill="#f9a8d4"/>
  <rect x="390" y="287" width="28" height="16" rx="8" fill="#f9a8d4"/>
  <rect x="248" y="390" width="16" height="28" rx="8" fill="#f9a8d4"/>
  <rect x="94"  y="287" width="28" height="16" rx="8" fill="#f9a8d4"/>

  <!-- Minute hand -->
  <line x1="256" y1="295" x2="256" y2="188" stroke="#e879f9" stroke-width="16" stroke-linecap="round"/>
  <!-- Hour hand -->
  <line x1="256" y1="295" x2="318" y2="338" stroke="#f43f5e" stroke-width="20" stroke-linecap="round"/>

  <!-- Center dot -->
  <circle cx="256" cy="295" r="14" fill="#e879f9"/>

  <!-- Feet -->
  <circle cx="208" cy="470" r="24" fill="white" opacity="0.9"/>
  <circle cx="304" cy="470" r="24" fill="white" opacity="0.9"/>
</svg>
